<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Карточки по ИИС</title>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --muted: #64748b;
      --text: #0f172a;
      --border: #e2e8f0;
      --accent: #111827;
      --green-bg: #ecfdf5;
      --green: #047857;
      --amber-bg: #fffbeb;
      --amber: #b45309;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px;
    }
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .panel h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    .section {
      padding: 18px;
    }
    .title {
      font-size: 30px;
      font-weight: 800;
      margin: 0;
    }
    .subtitle {
      color: var(--muted);
      margin-top: 6px;
      font-size: 14px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }
    .stat {
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      text-align: center;
    }
    .stat small {
      display: block;
      color: var(--muted);
      margin-bottom: 4px;
      font-size: 12px;
    }
    .stat strong {
      font-size: 24px;
    }
    .search {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }
    .filter {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      margin-top: 10px;
      cursor: pointer;
      user-select: none;
    }
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      border-radius: 16px;
      padding: 11px 14px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #f8fafc; }
    .q-list {
      max-height: 58vh;
      overflow: auto;
      padding-right: 4px;
    }
    .q-item {
      width: 100%;
      text-align: left;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: white;
      margin-bottom: 8px;
    }
    .q-item.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .q-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      opacity: .9;
    }
    .q-title {
      font-size: 14px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .main-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: #f8fafc;
    }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 310px;
      gap: 16px;
    }
    .card {
      min-height: 72vh;
      padding: 18px;
    }
    .card-inner {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .card-surface {
      flex: 1;
      background: #f8fafc;
      border-radius: 26px;
      padding: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }
    .question-face {
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.35;
      text-align: center;
      font-weight: 700;
      max-width: 950px;
    }
    .answer-face {
      font-size: 18px;
      line-height: 1.8;
      max-width: 920px;
      white-space: pre-wrap;
    }
    .side-panel .toggle {
      width: 100%;
      text-align: left;
      border-radius: 18px;
      padding: 15px 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .toggle.read.active {
      background: var(--green-bg);
      border-color: #a7f3d0;
      color: var(--green);
    }
    .toggle.diff.active {
      background: var(--amber-bg);
      border-color: #fde68a;
      color: var(--amber);
    }
    .num-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .num-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .pill-read {
      background: var(--green-bg);
      color: var(--green);
      border-color: #a7f3d0;
    }
    .pill-diff {
      background: var(--amber-bg);
      color: var(--amber);
      border-color: #fde68a;
    }
    @media (max-width: 1100px) {
      .layout, .main-grid { grid-template-columns: 1fr; }
      .q-list { max-height: 36vh; }
      .card { min-height: auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="layout">
      <div>
        <div class="section">
          <h1 class="title">Карточки по ИИС</h1>
          <div class="subtitle">GitHub Pages версия. Отметки «прочитано» и «сложный» сохраняются в браузере.</div>
          <div class="stats">
            <div class="stat"><small>Всего</small><strong id="statTotal">0</strong></div>
            <div class="stat"><small>Прочитано</small><strong id="statRead">0</strong></div>
            <div class="stat"><small>Сложные</small><strong id="statDiff">0</strong></div>
          </div>
        </div>

        <div class="panel section">
          <h2>Фильтры</h2>
          <input id="search" class="search" placeholder="Поиск по вопросу или ответу" />
          <label class="filter"><input type="checkbox" id="onlyDifficult" /> Только сложные</label>
          <label class="filter"><input type="checkbox" id="onlyUnread" /> Только непрочитанные</label>
          <div class="btn-row">
            <button id="markFilteredRead">Отметить список</button>
            <button id="resetMarks">Сбросить</button>
          </div>
        </div>

        <div class="panel section">
          <h2>Список вопросов</h2>
          <div class="q-list" id="questionList"></div>
        </div>
      </div>

      <div>
        <div class="panel main-top">
          <div>
            <div class="muted">Текущий список</div>
            <div class="pill-row">
              <span class="badge" id="filteredBadge">0 в списке</span>
              <span class="badge" id="positionBadge">1 / 1</span>
            </div>
          </div>
          <div class="controls">
            <button id="prevBtn">← Назад</button>
            <button id="randomBtn">Случайно</button>
            <button id="nextBtn">Вперёд →</button>
          </div>
        </div>

        <div class="main-grid">
          <div class="panel card">
            <div class="card-inner">
              <div class="card-top">
                <div>
                  <div class="muted" id="cardLabel">Вопрос</div>
                  <div class="pill-row" id="cardPills"></div>
                </div>
                <button id="flipBtn">Перевернуть карточку</button>
              </div>
              <div class="card-surface">
                <div id="cardContent" class="question-face"></div>
              </div>
            </div>
          </div>

          <div class="side-panel">
            <div class="panel section">
              <h2>Отметки</h2>
              <button class="toggle read" id="readToggle">
                <span>
                  <strong>Прочитано</strong><br />
                  <span class="muted">Видно в общем списке</span>
                </span>
                <span id="readIcon">○</span>
              </button>
              <button class="toggle diff" id="diffToggle">
                <span>
                  <strong>Сложный вопрос</strong><br />
                  <span class="muted">Можно быстро отфильтровать</span>
                </span>
                <span id="diffIcon">☆</span>
              </button>
            </div>

            <div class="panel section">
              <h2>Быстрый переход</h2>
              <div class="num-grid" id="numGrid"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const QUESTIONS = [{"num": 41, "question": "Активационная функция ИНС.", "answer": "Активационная функция нейронной сети — это функция, которая преобразует суммарный входной сигнал нейрона в его выходной сигнал. Она задает характер реакции нейрона и определяет, будет ли сеть вести себя как линейная модель или сможет описывать сложные нелинейные зависимости. Если бы активация была только линейной, возможности сети были бы сильно ограничены. Поэтому на практике используются разные типы активационных функций: линейная, полулинейная, пороговая функция единичного скачка, сигмоидная функция, гиперболический тангенс, экспоненциальная и знаковая функции. Особенно важна сигмоида, так как она имеет S-образный вид, обеспечивает плавный переход между значениями и удобна для обучения благодаря простому виду производной. Выбор функции активации влияет на скорость обучения, устойчивость сети и характер решаемой задачи."}, {"num": 49, "question": "Возможности применения теории нечетких множеств для описания различных видов неопределенности.", "answer": "Теория нечетких множеств особенно полезна для описания неопределенности в сложных реальных системах, где одновременно присутствуют точные измерения, интервальные оценки, статистические характеристики и лингвистические ограничения, полученные от экспертов. В таких условиях одного вероятностного подхода часто оказывается недостаточно, потому что он фактически сводит любую неопределенность к случайности. Во многих задачах управления и принятия решений основной источник неопределенности связан не со случайностью, а с расплывчатостью и нечеткостью самих границ понятий. Например, нельзя строго сказать, что только одно значение параметра является эффективным, а все остальные неэффективны. Точно так же ограничения на допустимость режима могут быть не только жесткими, но и мягкими. Теория нечетких множеств позволяет описывать такие ситуации естественно и адекватно. Применение нечетких множеств дает возможность формализовать лингвистические критерии, учитывать мягкие ограничения, объединять разнородную информацию и получать решения с заданным уровнем нечеткости. Поэтому этот аппарат широко используется в задачах контроля, управления, оценки состояний, экспертных систем и систем поддержки принятия решений."}, {"num": 38, "question": "Выражения на языке Prolog.", "answer": "Выражения в языке Prolog используются для представления термов, арифметических вычислений и логических целей. В самом широком смысле выражением можно считать любой корректный терм: атом, число, переменную или составную структуру. Особую группу образуют арифметические выражения, в которых используются операции сложения, вычитания, умножения, деления и другие вычислительные операции. Однако Prolog не вычисляет такие выражения автоматически как обычные императивные языки. Для вычисления применяется специальный механизм, например через предикат is, когда правая часть сначала вычисляется, а затем результат связывается с переменной. Кроме арифметических выражений, в Prolog широко применяются логические выражения-цели, которые могут объединяться в конъюнкции, дизъюнкции и отрицания. Поэтому выражения в Prolog — это не просто запись вычислений, а средство задания объектов, отношений и условий доказательства."}, {"num": 52, "question": "Генетические алгоритмы. Основные операции. Примеры.", "answer": "Основными операциями генетического алгоритма являются отбор, скрещивание и мутация. После выбора способа кодирования решений и задания функции приспособленности именно эти операции обеспечивают эволюцию популяции и поиск лучших решений. Отбор, или селекция, формирует новую популяцию на основании значений функции приспособленности. Чем выше приспособленность особи, тем больше вероятность, что она будет сохранена и даст потомство. Наиболее распространены метод рулетки, элитный отбор и турнирный отбор. Например, при методе рулетки более сильные особи получают больший сектор на условном колесе и потому чаще выбираются. Скрещивание, или кроссовер, означает обмен частями двух родительских хромосом. Благодаря этому в потомках объединяются удачные признаки разных решений. Мутация представляет собой случайное изменение одной или нескольких позиций в хромосоме. Она необходима для поддержания разнообразия популяции и выхода из локальных экстремумов. Например, в бинарной хромосоме мутация может состоять в замене 0 на 1 в случайно выбранном гене. Совместная работа этих операций позволяет алгоритму двигаться к более приспособленным решениям."}, {"num": 51, "question": "Генетические алгоритмы. Основные понятия. Примеры.", "answer": "Генетические алгоритмы - это адаптивные методы функциональной оптимизации, основанные на имитационном моделировании биологической эволюции. Их идея состоит в том, что решение задачи ищется не одним вариантом, а популяцией вариантов, которые постепенно улучшаются от поколения к поколению. Основные принципы генетических алгоритмов были сформулированы Голландом. Из биологии генетические алгоритмы заимствуют понятийный аппарат, идею коллективного поиска экстремума, способы представления наследственной информации и принцип преимущественного размножения наиболее приспособленных особей. В терминах генетического алгоритма особь - это некоторое решение задачи, хромосома - код этого решения, ген - отдельная позиция в хромосоме, а приспособленность определяется значением целевой функции. Примером применения генетических алгоритмов является задача поиска максимума функции многих переменных. В этом случае каждая особь кодирует набор значений переменных, а алгоритм постепенно отбирает, скрещивает и изменяет наиболее удачные варианты, приближаясь к оптимальному решению. Кроме того, генетические алгоритмы применяются в задачах планирования, маршрутизации, настройки параметров систем, проектирования конструкций и интеллектуального управления."}, {"num": 23, "question": "Декларативные и процедурные знания.", "answer": "Знания в общем случае подразделяются на декларативные и процедурные. Декларативные знания описывают объекты, их свойства, отношения и закономерности предметной области. Они отвечают на вопросы «что это такое?», «какие связи существуют?» и «почему это происходит?». К декларативным знаниям относятся, например, статьи энциклопедии, формулировки законов науки, описания понятий и явлений. Процедурные знания, напротив, описывают способы действий, последовательности операций и методы решения задач. Они отвечают на вопрос «как это сделать?». Примерами процедурных знаний являются программы для ЭВМ, алгоритмы, инструкции по сборке изделия, технологические карты. Главное различие между этими двумя типами знаний заключается в том, что декларативные знания фиксируют содержание предметной области, а процедурные — способы преобразования этого содержания и достижения результата. В интеллектуальных системах оба типа знаний важны: первые формируют базу представлений о мире, а вторые обеспечивают возможность действовать, делать выводы и решать задачи."}, {"num": 17, "question": "Диалектика «Структура - свойство - отношение» в рамках когнитивной теории.", "answer": "В рамках когнитивной теории диалектика «структура - свойство - отношение» показывает, что эти три категории тесно взаимосвязаны и могут переходить друг в друга в зависимости от условий рассмотрения. Одно и то же явление может быть понято либо как отношение между объектами, либо как свойство этих объектов, на котором основано данное отношение, либо как самостоятельная материальная структура. Свойство может существовать не только как характеристика объекта, но и как некая структура, способная существовать отдельно и независимо от того объекта, свойством которого оно ранее являлось. Благодаря наличию одинаковых или сходных свойств объекты вступают в определенные отношения друг с другом. Поэтому отношение нельзя рассматривать изолированно от свойств, а свойства — изолированно от структуры, в которой они воплощены. Данная диалектика важна для когнитивной теории потому, что в процессе познания человек постоянно переходит от описания структуры объектов к выделению их свойств и далее к установлению отношений между ними. Это делает возможным более глубокое понимание предметной области, формирование понятий, классификацию объектов и построение моделей причинно-следственных связей."}, {"num": 9, "question": "Жизненный цикл системы искусственного интеллекта и критерии перехода между этапами этого цикла.", "answer": "Жизненный цикл системы искусственного интеллекта включает последовательность этапов от появления идеи до снятия системы с эксплуатации. Первый этап — разработка идеи и концепции системы; переход к следующему этапу происходит тогда, когда появляется заказчик или спонсор, заинтересованный в системе. Второй этап — разработка теоретических основ, где обосновывается выбор математической модели или необходимость создания новой. Третий этап — разработка математической модели системы. Затем разрабатывается методика численных расчетов: структуры данных и алгоритмы обработки данных. После этого проектируются структура системы и экранные формы интерфейса. Следующий этап — программная реализация системы, за которой идет отладка на контрольных примерах. Затем система проходит экспериментальную эксплуатацию на реальных данных без практического применения результатов, после чего — опытную эксплуатацию уже с использованием результатов на практике. При успешном завершении этих этапов система переходит в промышленную эксплуатацию. Далее возможны заказные модификации, связанные с принципиальными изменениями модели, структур данных и алгоритмов, а затем разработка новых версий. Завершается жизненный цикл снятием системы с эксплуатации. Критерии перехода между этапами связаны с достижением определенной степени готовности системы. Это может быть появление заинтересованного заказчика, завершение теоретического обоснования, детальная проработка модели, отсутствие новых ошибок на контрольных или реальных данных, практическая приемлемость результатов, а также техническая или экономическая целесообразность дальнейшего развития. Таким образом, жизненный цикл СИИ отражает не только техническую разработку, но и постепенную проверку, внедрение, сопровождение и обновление системы."}, {"num": 37, "question": "Запросы на языке Prolog. Унификация.", "answer": "Запрос в языке Prolog — это вопрос к базе знаний, который формулируется в виде цели, подлежащей доказательству. Система пытается найти такие факты и правила, которые подтверждают истинность запроса. Если запрос содержит переменные, Prolog подбирает для них значения, при которых цель становится истинной. Ключевым механизмом при этом является унификация. Унификация — это процесс сопоставления двух термов с целью сделать их одинаковыми за счет подстановки значений переменных. Если термы совместимы, система находит нужную подстановку и продолжает вывод; если нет, происходит возврат и поиск другого варианта решения. Например, если в базе знаний есть факт father(ivan, petr), а в запросе задано father(X, petr), то в результате унификации переменная X получит значение ivan. Таким образом, запросы в Prolog решаются через доказательство целей, а унификация служит основным инструментом связывания переменных и структур."}, {"num": 19, "question": "Иерархия задач обработки данных: «мониторинг», «анализ», «прогнозирование», «управление» в рамках когнитивной теории.", "answer": "В рамках когнитивной теории задачи обработки данных образуют иерархию, где каждый следующий уровень опирается на предыдущий и предполагает более высокий уровень осмысления информации. Первым уровнем является мониторинг. Он связан с накоплением эмпирических фактов по ряду показателей об объекте управления с привязкой ко времени. На этом уровне данные фиксируются, сохраняются и подготавливаются для дальнейшей обработки. Второй уровень — анализ. Его задача состоит в выявлении смысла в данных, то есть в обнаружении причинно-следственных взаимосвязей, скрытых в накопленных фактах. Если мониторинг отвечает на вопрос «что происходит», то анализ пытается выяснить «почему это происходит». Третий уровень — прогнозирование. Здесь уже используется смысл причинно-следственных зависимостей для предсказания поведения объекта управления в условиях действия определенных факторов. Прогнозирование позволяет оценить будущие состояния объекта и возможные последствия различных воздействий. Высшим уровнем является управление. Оно связано с использованием знаний для достижения определенных целей. На этом уровне выбираются и применяются такие воздействия, которые позволяют направить развитие объекта в желательную сторону. Таким образом, мониторинг дает данные, анализ извлекает смысл, прогнозирование предсказывает будущее, а управление превращает знания в целенаправленное действие."}, {"num": 40, "question": "ИНС. Структура. Решаемые задачи.", "answer": "Искусственная нейронная сеть представляет собой систему взаимосвязанных формальных нейронов, которые принимают входные сигналы, преобразуют их и выдают результат на выходе. Типичный формальный нейрон получает набор входов, каждый из которых умножается на свой вес, затем эти взвешенные сигналы суммируются, после чего к сумме применяется функция активации. Именно поэтому структура нейронной сети включает входной слой, один или несколько скрытых слоев и выходной слой. На входной слой поступают признаки объекта, скрытые слои выполняют преобразование и выделение существенных зависимостей, а выходной слой формирует итоговое решение. Нейронные сети решают широкий круг задач: классификацию и распознавание образов, кластеризацию, аппроксимацию функций, прогнозирование, оптимизацию, задачи ассоциативной памяти и управления. В обобщенном виде эти задачи сводятся к двум основным классам: классификации и регрессии."}, {"num": 3, "question": "Интеллектуальная информационная система и ее основные свойства.", "answer": "Интеллектуальная информационная система — это информационная система, которая использует знания, модели рассуждения, методы анализа и обучения для решения задач, требующих не только хранения и обработки данных, но и выработки решений. В отличие от обычной информационной системы, она ориентирована на поддержку или частичную автоматизацию интеллектуальной деятельности человека. К основным свойствам ИИС относятся: способность работать со знаниями и использовать их при решении задач; возможность решать слабоформализованные и неструктурированные задачи; наличие механизма логического вывода или выработки решений; адаптивность, то есть способность настраиваться или обучаться; высокая степень автоматизации процессов анализа; возможность поддержки выбора решения в изменяющейся среде; а также диалоговый характер взаимодействия с пользователем. Важным свойством ИИС является и то, что она не просто фиксирует факты, а преобразует данные в информацию, а затем в знания, пригодные для практического использования."}, {"num": 8, "question": "Информационная модель реакции систем искусственного интеллекта на воздействия окружающей среды.", "answer": "Информационная модель реакции системы искусственного интеллекта на воздействия окружающей среды описывает процесс, при котором система воспринимает вызов среды, распознает ситуацию, выбирает или синтезирует решение и переходит в новое состояние. Сначала в систему поступают исходные данные для идентификации ситуации. Если ситуация распознается как типовая, то система обращается к памяти и выбирает типовое решение. После этого осуществляется переход системы в типовое состояние и сохраняется ее прежнее качество. Если же ситуация является нетиповой, система должна выработать нетривиальное решение. При правильном решении возможен переход системы в качественно новое состояние, то есть развитие системы. Если решение оказывается неверным, возможно ухудшение состояния вплоть до гибели системы. Важной частью модели являются обратные связи: обратная связь для адаптации позволяет уточнять выбор типовых решений, а обратная связь для синтеза обеспечивает выработку новых решений для нетиповых ситуаций. Таким образом, модель показывает, что интеллектуальная система не просто реагирует на внешние воздействия, а использует механизмы распознавания, памяти, выбора, адаптации и развития."}, {"num": 2, "question": "История исследований в области искусственного интеллекта и основные понятия в данной области.", "answer": "История исследований в области искусственного интеллекта связана с постепенным переходом от идей формализации мышления к построению систем, способных выполнять отдельные интеллектуальные функции человека. На ранних этапах внимание уделялось логическим моделям рассуждений, формальному представлению знаний и попыткам воспроизвести процесс принятия решений. Затем развитие получило направление экспертных систем, которые использовали знания специалистов для решения узкоспециализированных задач. В дальнейшем исследования расширились в сторону распознавания образов, нейронных сетей, генетических алгоритмов, когнитивного моделирования, извлечения знаний из данных и интеллектуального анализа данных. Таким образом, развитие ИИ шло от моделирования отдельных рассуждений к созданию более сложных обучающихся и адаптивных систем. К основным понятиям данной области относятся данные, информация и знания. Данные понимаются как сведения, рассматриваемые в синтаксическом аспекте, без учета их смысла и назначения. Информация — это уже осмысленные данные, интерпретированные с использованием некоторого тезауруса. Знания представляют собой систему информации, которая повышает вероятность достижения цели и фактически выражает полезный опыт, правила и технологии решения задач. Кроме того, важны такие понятия, как когнитивные процессы, когнитивное моделирование, интеллектуальная система, база знаний, логический вывод, обучение и адаптация. Все они описывают различные стороны искусственного интеллекта как области, направленной на автоматизацию познания, анализа и принятия решений."}, {"num": 44, "question": "Классификация ИНС.", "answer": "Классификация искусственных нейронных сетей проводится по нескольким основаниям. По структуре связей различают неполносвязные, или слоистые, и полносвязные сети; сети со случайными, регулярными и обратными, то есть рекуррентными, связями; сети с симметричными и несимметричными связями. По особенностям модели нейрона выделяют аналоговые и бинарные сети, а также сети, в которых изменяются только веса синапсов, веса вместе с порогами или даже сами связи между нейронами. Кроме того, различают сети с непрерывным и дискретным временем. По особенностям обучения выделяют сети с учителем и без учителя, сети с обучением по входам или по выходам, а также сети, в которых примеры предъявляются по одному или группами. Такая классификация показывает, что нейронные сети могут сильно различаться и по устройству, и по способу функционирования, и по характеру обучения."}, {"num": 4, "question": "Классификация интеллектуальных информационных систем.", "answer": "Интеллектуальные информационные системы классифицируются по нескольким основаниям. По области применения выделяют, например, ИИС менеджмента, медицинские ИИС и военные ИИС. По степени интеграции различают автономные, сопрягаемые и интегрированные системы. По адаптивности системы подразделяются на обучаемые и настраиваемые. По оперативности выделяют статические и динамические системы, причем динамические могут быть системами реального времени или советующими системами. Системы также можно классифицировать по модели представления знаний. Здесь выделяют системы, основанные на немонотонных, модальных и временных логиках, марковских и байесовских сетях вывода, каузальных деревьях и теории веры, ТНМ и ТНЛ, исчислении предикатов, а также теории Демпстера–Шейфера. Кроме того, в рамках классификации систем искусственного интеллекта отдельно выделяются системы с интеллектуальной обратной связью и интеллектуальными интерфейсами, системы распознавания образов, системы поддержки принятия решений, экспертные системы, генетические алгоритмы, когнитивное моделирование, системы извлечения знаний и нейронные сети. Такая классификация показывает, что ИИС различаются как по сфере применения, так и по способам реализации интеллектуальных функций."}, {"num": 20, "question": "Когнитивная структуризация знаний об исследуемом объекте и внешней среды на основе PEST-анализа.", "answer": "Когнитивная структуризация знаний об исследуемом объекте и внешней среде представляет собой начальный этап когнитивного анализа и моделирования. Ее цель состоит в том, чтобы выделить наиболее существенные факторы, определяющие состояние и развитие объекта, а также установить их взаимосвязи. Для отбора базисных факторов применяется PEST-анализ. Он выделяет четыре основные группы факторов, влияющих на поведение исследуемого объекта. Первая группа — Policy, то есть политические факторы. Вторая — Economy, экономические факторы. Третья — Society, социальные и социокультурные факторы. Четвертая — Technology, технологические и научно-технические факторы. Такое деление позволяет системно охватить как внутренние, так и внешние условия существования объекта. На практике когнитивная структуризация на основе PEST-анализа включает анализ исходной ситуации вокруг объекта, выделение базисных факторов, описание процессов, протекающих в самом объекте и в его макроокружении, а также определение того, как эти процессы влияют на развитие объекта. Результатом становится проблемное поле исследуемого объекта, которое в дальнейшем может быть уточнено с помощью SWOT-анализа, а затем использовано для построения когнитивной модели. Таким образом, PEST-анализ задает основу для системного описания предметной области и последующего моделирования ситуации."}, {"num": 14, "question": "Когнитивное моделирование.", "answer": "Когнитивное моделирование — это способ анализа сложных ситуаций, основанный на выявлении факторов, влияющих на объект управления, а также силы, направления и характера их взаимного влияния. Его назначение состоит в том, чтобы определить, каким образом можно перевести объект в желаемое состояние или, наоборот, предотвратить переход в нежелательное состояние. В основе когнитивного моделирования лежит когнитивная, или познавательно-целевая, структуризация знаний об объекте и внешней среде. На этом этапе выделяются будущие целевые и нежелательные состояния объекта, наиболее существенные внутренние и внешние факторы, а также причинно-следственные связи между ними. После этого строится когнитивная модель, обычно в виде ориентированного графа или матрицы взаимосвязей факторов. Далее модель используется для анализа структуры ситуации, сценарного исследования, прогнозирования развития обстановки и выбора стратегий управления. С ее помощью можно исследовать различные варианты развития событий, оценивать последствия управленческих воздействий, сравнивать стратегии и выбирать наиболее эффективные из них. Таким образом, когнитивное моделирование служит важным инструментом исследования сложных слабоформализуемых систем и поддержки принятия решений."}, {"num": 11, "question": "Концепция системно-когнитивного анализа. Базовая когнитивная концепция.", "answer": "Системно-когнитивный анализ направлен на автоматизацию процесса познания. Его исходная идея состоит в том, что автоматизировать познание в целом значительно сложнее, чем отдельные операции, поэтому сначала необходимо выделить эти операции, затем установить их место в общей системе познавательной деятельности. Базовая когнитивная концепция должна удовлетворять ряду требований. Во-первых, она должна быть адекватной, то есть достаточно точно отражать сущность человеческих процессов познания. Особенно важно учитывать такие процессы, как вербализация, семантическая адаптация и семантический синтез, то есть уточнение смысла слов, понятий и включение в систему новых понятий. Во-вторых, концепция должна быть достаточно детализированной и структурированной, чтобы ее можно было разложить на простые базовые когнитивные операции. В-третьих, она должна допускать математическое описание, формализацию и последующую автоматизацию. Таким образом, базовая когнитивная концепция в системно-когнитивном анализе рассматривает познание как упорядоченную систему операций обработки информации. Это делает возможным переход от описания человеческого мышления к созданию интеллектуальных систем, способных анализировать данные, формировать знания, интерпретировать ситуации и поддерживать принятие решений."}, {"num": 12, "question": "Концепция системно-когнитивного анализа. Когнитивная концепция в свободном изложении.", "answer": "В свободном изложении когнитивная концепция рассматривает процесс познания как многоуровневую иерархическую систему обработки информации. На нижних уровнях человек воспринимает свойства и признаки объектов внешнего мира. Далее эти признаки объединяются в образы объектов, затем объекты группируются в классы, классы — в кластеры, а на более высоких уровнях формируются конструкты, то есть обобщенные смысловые структуры. Такой подход показывает, что познание не сводится к простому накоплению фактов. Оно включает последовательные переходы от единичных восприятий к все более сложным и обобщенным формам знания. Каждый следующий уровень строится на предыдущем, но одновременно придает ему новый смысл. Поэтому смысл возникает не из отдельного факта сам по себе, а из его места в общей системе взаимосвязанных представлений. С точки зрения искусственного интеллекта эта концепция важна тем, что позволяет представить познание как процесс поэтапной переработки информации: от чувственных данных к образам, от образов к понятиям, от понятий к системам знаний и моделям реальности. Именно на этом основаны методы интеллектуального анализа, классификации, распознавания и построения когнитивных моделей."}, {"num": 13, "question": "Концепция системно-когнитивного анализа. Когнитивная концепция в формальном изложении.", "answer": "В формальном изложении когнитивная концепция описывает познание как цикл взаимодействия модели с опытом. Сначала с помощью модели выполняются операции идентификации и прогнозирования. Затем результаты проверяются посредством когнитивной операции верификации, то есть сопоставляются с реальными данными и опытом. После этого принимается решение о необходимости обучения и адаптации модели. Далее возможны три основных случая. Первый случай: объект входит в обучающую выборку и достоверно идентифицируется. Это означает внутреннюю валидность модели и отсутствие необходимости в ее адаптации. Второй случай: объект не входит в обучающую выборку, но принадлежит исходной генеральной совокупности, для которой выборка является репрезентативной, и при этом достоверно идентифицируется. Тогда добавление объекта в обучающую выборку и адаптация модели приводят к количественному уточнению смысла признаков и образов классов. Третий случай: объект не входит в исходную генеральную совокупность и идентифицируется недостоверно. В этом случае включение объекта в обучение и синтез новой модели приводят уже к качественному уточнению признаков и классов, а также к расширению исходной генеральной совокупности. Следовательно, формальное изложение когнитивной концепции показывает, что интеллектуальная система не просто применяет готовую модель, а способна проверять ее, уточнять и расширять по мере накопления нового опыта. Это делает процесс познания адаптивным и развивающимся."}, {"num": 16, "question": "Концепция смысла Шенка-Абельсона.", "answer": "Концепция смысла Шенка-Абельсона исходит из того, что понимание смысла связано не просто с определением значения слова или факта, а с выявлением его причинно-следственных связей. В данной концепции факты рассматриваются как причины, а их смысл считается известным тогда, когда известны последствия этих фактов. Иными словами, понять событие — значит установить, к чему оно ведет и с чем связано. В более широком плане все теории понимания смысла делятся на три группы: объектные, субъект-объектные и субъектные. Объектные теории связывают понимание со значением языкового знака. Субъект-объектные дополняют это описание реальными психологическими процессами понимания. Субъектные теории учитывают также оценку результатов понимания самим субъектом, например через диалог, рефлексию или монолог. Ключевым моментом концепции Шенка-Абельсона является определение силы и направленности причинно-следственных связей и их количественная оценка. Однако именно здесь проявляется и ее слабое место: очень трудно корректно выбрать количественную меру силы связи и надежно определить ее численное значение для каждого конкретного факта на основе эмпирических данных. Несмотря на это, концепция имеет большое значение, поскольку подчеркивает причинно-следственную природу смысла и сближает семантику с анализом реальных процессов."}, {"num": 24, "question": "Логическая модель представления знаний.", "answer": "Логическая модель представления знаний основана на средствах формальной логики. В ней знания задаются в виде логических высказываний, предикатов, формул и правил вывода, а обработка знаний сводится к доказательству истинности одних утверждений на основе других. Такая модель наиболее удобна тогда, когда предметная область может быть описана строго, однозначно и непротиворечиво. В рамках логической модели факты представляются как истинные утверждения о предметной области, а связи между ними — как логические отношения. Используются операции конъюнкции, дизъюнкции, отрицания, импликации, а также аппараты исчисления высказываний и исчисления предикатов. На основе этих средств строятся правила вывода, позволяющие получать новые знания из уже имеющихся. Преимущество логической модели состоит в ее строгости, формальной однозначности и возможности автоматического логического вывода. Однако она менее удобна в тех случаях, когда знания являются неполными, нечеткими, контекстно зависимыми или трудно формализуемыми. Поэтому в интеллектуальных системах логическая модель часто используется вместе с другими моделями представления знаний."}, {"num": 43, "question": "Машинное обучение нейронной сети на примерах.", "answer": "Машинное обучение нейронной сети на примерах состоит в настройке весовых коэффициентов нейронов по обучающей выборке. Обучающая выборка содержит пары векторов: входной вектор признаков объекта и соответствующий ему эталонный выходной вектор. Нейронная сеть считается обученной, если при подаче каждого входного вектора она формирует требуемый выход. В алгоритме Розенблатта начальные веса выбираются случайно. Затем сети предъявляется входной образ, формируется фактический выход, вычисляется ошибка, после чего веса корректируются пропорционально этой ошибке. Если ошибка положительная, связь усиливается, если отрицательная — ослабляется; если ошибки нет, веса не меняются. После обработки всех примеров завершается одна эпоха обучения. Обучение продолжается до тех пор, пока веса не перестанут существенно изменяться или суммарная ошибка не станет меньше заданного малого значения. По сути обучение можно понимать как постепенное изменение положения разделяющей гиперплоскости при обнаружении неправильно классифицированных примеров."}, {"num": 45, "question": "Многослойные ИНС.", "answer": "Многослойные искусственные нейронные сети состоят из входного слоя, одного или нескольких скрытых слоев и выходного слоя. Их главное преимущество по сравнению с однослойными сетями заключается в способности реализовывать более сложные нелинейные зависимости и решать задачи, которые не сводятся к простому линейному разделению. Многослойный персептрон представляет собой обучаемую распознающую систему, которая формирует решающее правило уже не в пространстве первичных, а в пространстве вторичных признаков. При обучении многослойной сети на вход подаются примеры обучающей выборки и указания о правильном классе, после чего веса корректируются по величине ошибки. Наиболее известным методом обучения является алгоритм обратного распространения ошибки. Он включает прямой проход, когда формируется фактический выход сети, и обратный проход, когда сигнал ошибки распространяется в обратном направлении и используется для настройки весов. Благодаря скрытым слоям такие сети способны аппроксимировать сложные функции, решать задачи распознавания, прогноза и управления значительно эффективнее однослойных моделей."}, {"num": 46, "question": "Модель Хопфилда.", "answer": "Модель Хопфилда представляет собой особый вид нейронной сети, предназначенной прежде всего для ассоциативной памяти. Она является развитием идеи многослойного персептрона, но отличается тем, что все нейроны в такой сети непосредственно связаны друг с другом. Связи между нейронами симметричны, то есть вес связи от i-го нейрона к j-му равен весу связи от j-го нейрона к i-му, а связь нейрона с самим собой отсутствует. Каждый нейрон в сети Хопфилда может находиться только в одном из двух состояний. Изменение состояний может происходить последовательно или параллельно. В процессе обучения в матрицу весов записываются образы, которые затем сеть способна восстанавливать по неполному или искаженному входному сигналу. Поэтому сеть Хопфилда называют рекуррентной сетью ассоциативной памяти. Основное назначение модели Хопфилда состоит в хранении и восстановлении образов. Если на вход подан фрагмент ранее запомненного образа или его зашумленная версия, сеть, изменяя состояния нейронов, стремится перейти в устойчивое состояние, соответствующее одному из сохраненных образов. Благодаря этому модель применяется в задачах распознавания, восстановления данных и моделирования памяти."}, {"num": 48, "question": "Нечеткие множества. Определение. Способы задания.", "answer": "Нечеткое множество - это множество, для которого принадлежность элемента задается не по принципу \"принадлежит или не принадлежит\", а с помощью степени принадлежности из интервала от 0 до 1. Если в обычном множестве элемент либо входит в него, либо нет, то в нечетком множестве один и тот же элемент может принадлежать ему частично. Это удобно для описания понятий естественного языка, таких как \"молодой\", \"высокий\", \"теплый\", \"почти допустимый\". Основной характеристикой нечеткого множества является функция принадлежности. Именно она показывает, в какой степени каждый элемент носителя относится к данному множеству. Если степень принадлежности равна 1, элемент принадлежит полностью; если 0 - не принадлежит; промежуточные значения означают частичную принадлежность. Нечеткие множества задаются несколькими способами. Во-первых, таблично, когда для каждого значения аргумента указывается соответствующая степень принадлежности. Во-вторых, графически, в виде кривой функции принадлежности. В-третьих, аналитически, через формулу, описывающую эту функцию. Кроме того, на практике нечеткие множества часто задаются лингвистически, через экспертные оценки и словесные термы, которые затем переводятся в функцию принадлежности."}, {"num": 53, "question": "Обработка естественного языка. Классификация, цели, задачи.", "answer": "Обработка естественного языка - это направление искусственного интеллекта, целью которого является моделирование понимания и порождения естественного языка интеллектуальной системой. Под естественным языком понимается обычный человеческий язык, используемый в речи и тексте. Для интеллектуальных систем эта область особенно важна, потому что именно через язык происходит взаимодействие человека и машины, постановка задач, получение ответов и интерпретация знаний. С точки зрения классификации обработку естественного языка можно рассматривать как совокупность задач анализа и синтеза языка. К анализу относятся распознавание структуры высказывания, выделение слов и их форм, синтаксический разбор, определение смысла и извлечение знаний из текста. К синтезу относятся построение фраз, генерация ответов, формирование сообщений и диалоговое взаимодействие. Основные цели обработки естественного языка состоят в том, чтобы научить систему понимать текст и речь, извлекать смысл, работать с контекстом и использовать язык как средство доступа к знаниям. К числу задач относятся морфологический, синтаксический и семантический анализ, поиск информации по содержанию, классификация документов, машинный перевод, диалоговые системы, распознавание грамматически правильных предложений и представление смысла высказываний."}, {"num": 54, "question": "Обработка естественного языка. Технологии анализа.", "answer": "Технологии анализа естественного языка включают несколько уровней обработки. На начальном уровне выполняется лексический и морфологический анализ: текст разбивается на слова, определяются их основы, грамматические формы и служебные характеристики. Далее выполняется синтаксический анализ, то есть выявление структуры предложения и связей между словами. Следующий уровень - семантический анализ, при котором устанавливается смысл высказывания, выявляются отношения между объектами, действиями и признаками. В более сложных системах анализ дополняется прагматическим уровнем, где учитываются ситуация общения, цель высказывания и контекст. Для представления результатов могут использоваться словари, грамматики, семантические сети, фреймы, продукционные правила и вероятностные модели. В лекциях также отмечается применение нейронных сетей для обработки предложений естественного языка. Рекуррентные сети используются для распознавания грамматически правильных предложений, семантические нейронные сети - для представления и распознавания смысла, а модели кластеризации - для группировки слов и фраз при поиске документов по содержанию. Таким образом, современные технологии анализа естественного языка сочетают лингвистические методы, методы представления знаний и нейросетевые подходы."}, {"num": 32, "question": "Обратный метод логического дедуктивного вывода.", "answer": "Обратный метод логического дедуктивного вывода — это способ решения задач в продукционной интеллектуальной системе, при котором рассуждение начинается с цели, то есть с того факта, который требуется доказать. Система сначала выбирает правила, в правой части которых содержится нужное заключение, а затем последовательно проверяет, могут ли быть доказаны условия этих правил. Если для проверки условия не хватает некоторого факта, система пытается получить его либо из других правил, либо из внешнего источника данных, например от пользователя или из базы данных. Таким образом, рассуждение идет от цели к исходным фактам. Достоинство метода состоит в том, что он позволяет сократить число обращений к источнику данных и не рассматривать заведомо лишние факты. Поэтому такой способ удобен в задачах диагностики и консультирования, когда важно минимизировать количество вопросов пользователю."}, {"num": 55, "question": "Обучение с подкреплением. Динамическое программирование.", "answer": "В обучении с подкреплением агент взаимодействует со средой, выбирает действия, получает вознаграждение и стремится найти такую стратегию, которая максимизирует суммарную награду. Одним из фундаментальных подходов к решению таких задач является динамическое программирование. Оно возникло в рамках теории оптимального управления и связано с работами Ричарда Беллмана. Суть динамического программирования состоит в использовании состояния системы и функции ценности для вывода уравнения Беллмана. Это уравнение связывает ценность текущего состояния с немедленным вознаграждением и ценностью будущих состояний. На этой основе строятся итерационные методы, которые шаг за шагом уточняют оценки и приводят к оптимальной стратегии. В дискретной стохастической постановке основой служит марковский процесс принятия решений. Для обучения с подкреплением динамическое программирование важно тем, что дает строгую математическую основу для нахождения оптимальной политики. Однако классические методы динамического программирования обычно требуют полного знания среды: вероятностей переходов и функции награды. Поэтому в чистом виде они чаще рассматриваются как теоретическая база обучения с подкреплением и как исходная точка для построения более практичных алгоритмов."}, {"num": 56, "question": "Обучение с подкреплением. Метод временных разностей.", "answer": "Метод временных разностей относится к числу центральных методов обучения с подкреплением. Он занимает промежуточное положение между динамическим программированием и обучением методом проб и ошибок. Идея метода состоит в том, что оценка состояния или действия уточняется не после завершения всего эпизода, а уже на каждом шаге, на основе различия между старым прогнозом и новым, более информативным прогнозом. Именно это различие и называется временной разностью. Если агент ожидал получить одну ценность, а в результате действия получил награду и перешел в состояние с другой оценкой, возникает ошибка прогноза. Эта ошибка используется для коррекции функции ценности. Благодаря такому механизму обучение происходит постепенно, инкрементно и без необходимости полного знания модели среды. К методам временных разностей относятся, в частности, TD-подходы и Q-learning. В Q-learning оценивается полезность пары \"состояние - действие\", то есть Q-функция, которая показывает ожидаемую суммарную награду. Алгоритм итеративно обновляет эту оценку и тем самым улучшает стратегию агента. Преимущество метода временных разностей состоит в том, что он может обучаться непосредственно на опыте взаимодействия со средой и сочетает вычислительную эффективность с хорошими практическими результатами."}, {"num": 42, "question": "Однослойная нейронная сеть и персептрон Розенблата.", "answer": "Однослойная нейронная сеть, или простейший персептрон, состоит из входов и одного вычислительного слоя нейронов, который непосредственно формирует выход. Каждый выходной нейрон получает сигналы от всех входов, вычисляет их взвешенную сумму и применяет функцию активации. Такая сеть способна решать задачи линейного разделения множеств, то есть корректно работает только в тех случаях, когда классы можно разделить гиперплоскостью в пространстве признаков. Персептрон Розенблатта является развитием этой идеи. В классической схеме он включает S-элементы, A-элементы и R-элементы, что позволяет организовать распознавание образов и обучение на примерах. Персептрон Розенблатта стал одной из первых практически значимых моделей нейронных сетей и заложил основу для дальнейшего развития обучаемых систем распознавания."}, {"num": 7, "question": "Определение систем искусственного интеллекта.", "answer": "Системы искусственного интеллекта — это системы, предназначенные для решения задач, которые требуют использования знаний, рассуждений, обучения, распознавания и выбора решений, то есть тех функций, которые обычно связывают с интеллектуальной деятельностью человека. Такие системы опираются не только на данные, но и на специально организованные знания о предметной области, а также на методы логического вывода, поиска решений, обучения и адаптации. Иначе говоря, система искусственного интеллекта представляет собой интеллектуальную информационную систему, способную в определенной предметной области анализировать ситуацию, использовать накопленные знания, строить выводы и предлагать решения на уровне, приближенном к деятельности специалиста. Ее особенностью является возможность работать с не полностью формализованными задачами, учитывать неопределенность, а в ряде случаев — обучаться на опыте и изменять свое поведение в зависимости от внешней среды."}, {"num": 36, "question": "Основные компоненты языка Prolog.", "answer": "Основные компоненты языка Prolog связаны с его логической природой. Базой языка являются факты, правила и запросы. Факты фиксируют уже известные истинные сведения о предметной области. Правила задают зависимости вида «если …, то …», то есть позволяют выводить новые знания из уже известных. Запросы служат для обращения к базе знаний и проверки, можно ли доказать некоторое утверждение. Основной единицей описания является предикат, который выражает отношение между объектами. Все объекты языка представляются термами. К термам относятся атомы, числа, переменные и составные структуры. Атомы обозначают константы и имена объектов, переменные обозначают неизвестные величины, а структуры позволяют объединять данные в сложные составные выражения. Работа программы в Prolog строится как попытка доказать запрос на основе фактов и правил с использованием механизма логического вывода и возврата."}, {"num": 10, "question": "Основные понятия когнитивной теории.", "answer": "Основные понятия когнитивной теории связаны с изучением и моделированием процессов познания. Сам термин «когнитивный» происходит от английского cognition — познание. В рамках данной теории он используется и в психологии, и в системах искусственного интеллекта, где ставится задача автоматизации отдельных функций человеческого познания. Когнитивная психология изучает реальные процессы познания у человека: восприятие, запоминание, понимание, классификацию, формирование образов и принятие решений. Для интеллектуальных систем это важно потому, что именно человеческие когнитивные процессы служат образцом для построения моделей обработки информации. Когнитивное моделирование представляет собой способ анализа, при котором определяется сила и направление влияния факторов на перевод объекта управления в целевое состояние. При этом учитываются не только сами факторы, но и их сходство, различие и взаимное влияние. Такой подход позволяет исследовать сложные, плохо формализуемые ситуации. Одним из базовых понятий является классическая когнитивная карта. Она представляет собой ориентированный граф, в котором особое место занимает вершина, соответствующая будущему, чаще всего целевому, состоянию объекта управления. Остальные вершины отражают факторы, а дуги между ними показывают направление, силу и знак влияния. Следовательно, когнитивная карта служит наглядной моделью причинно-следственных связей в предметной области."}, {"num": 50, "question": "Понятие о нечеткой логике.", "answer": "Нечеткая логика - это логика, в которой высказывания могут быть не только истинными или ложными, но и истинными в некоторой степени. Степень истинности нечеткого высказывания принимает значения от 0 до 1. Тем самым нечеткая логика расширяет классическую булеву логику и делает возможным формальное описание рассуждений, содержащих неопределенные или расплывчатые понятия. В нечеткой логике вводятся основные логические операции над нечеткими высказываниями. Отрицание определяется как единица минус степень истинности исходного высказывания. Конъюнкция соответствует минимуму степеней истинности, дизъюнкция - максимуму, импликация определяется через максимум из отрицания посылки и истинности следствия. Эквивалентность связывается со степенью близости двух высказываний. Нечеткая логика применяется там, где знания и правила удобно выражать в форме естественного языка: \"если температура высокая, а давление умеренное, то режим близок к опасному\". Благодаря этому она широко используется в интеллектуальных системах, экспертных системах, управлении техническими объектами и принятии решений в условиях неопределенности."}, {"num": 15, "question": "Понятия «данные», «информация», «знания». Примеры.", "answer": "Данные — это информация, рассматриваемая в чисто синтаксическом аспекте, то есть безотносительно к ее смыслу и цели использования. Иначе говоря, данные существуют как зафиксированные значения, символы, числа, записи или сигналы. Например, набор чисел «38,2; 39,1; 37,8» сам по себе является данными. Информация — это данные, которые уже интерпретированы с использованием некоторого тезауруса, то есть осмыслены. Когда мы понимаем, что приведенные выше числа обозначают температуру пациента в разные моменты времени, данные превращаются в информацию. Следовательно, информация — это осмысленные данные, рассматриваемые в единстве синтаксического и семантического аспектов. Знания — это система информации, которая повышает вероятность достижения цели. По существу, знания представляют собой «ноу-хау», то есть понимание того, как действовать в определенной ситуации. Например, знание о том, что температура выше 39 градусов при определенных симптомах может указывать на инфекционный процесс и требует конкретных действий, уже является знанием. Таким образом, данные отвечают на вопрос «что зафиксировано», информация — «что это означает», а знания — «как это использовать для достижения цели»."}, {"num": 18, "question": "Понятия «факт», «смысл», «мысль» в рамках когнитивной теории.", "answer": "В когнитивной теории факт понимается как соответствие элементов разных уровней интеграции и иерархии процессов познания, обнаруженное на опыте. Иначе говоря, факт — это установленная опытом связь между различными элементами познавательной системы. При этом факт рассматривается как квант, то есть как элементарная частица смысла. Смысл определяется как «разность потенциалов» между смежными уровнями интеграции-иерархии в системе обработки информации. Это означает, что смысл возникает при переходе от одного уровня организации знания к другому, когда между ними обнаруживается определенное соответствие, различие или связь. Следовательно, смысл нельзя свести только к отдельному слову или отдельному объекту; он рождается в системе переходов и соотношений. Мысль в рамках данной теории — это операция выявления смысла из фактов. А мышление, соответственно, представляет собой процесс, состоящий из ряда взаимосвязанных по смыслу мыслей. Таким образом, факт служит исходным материалом познания, смысл является содержанием, которое извлекается из фактов, а мысль — конкретным актом этого извлечения."}, {"num": 5, "question": "Примеры интеллектуальных информационных систем.", "answer": "К числу примеров интеллектуальных информационных систем относятся экспертные системы, автоматизированные системы распознавания образов, системы поддержки принятия решений, нейронные сети, системы интеллектуального анализа данных и когнитивные модели. Экспертные системы применяются для диагностики, прогнозирования, проектирования, планирования, управления и обучения. Системы распознавания образов используются для идентификации объектов, сигналов, текстов и изображений. Системы поддержки принятия решений помогают руководителям и специалистам выбирать наиболее рациональные действия в сложной ситуации. Нейронные сети применяются для обучения на примерах, классификации и прогнозирования. Генетические алгоритмы используются для поиска эффективных решений в задачах оптимизации. Интеллектуальный анализ данных позволяет выявлять скрытые закономерности, а когнитивное моделирование — исследовать влияние различных факторов на развитие сложных социально-экономических объектов. На практике такие системы могут использоваться в медицине, банковской сфере, промышленности, управлении предприятием, логистике и безопасности."}, {"num": 35, "question": "Примеры построения ЭС.", "answer": "Примером построения экспертной системы является экспертная диагностическая система для определения состояния объекта диагностирования и выявления неисправностей. Сначала эксперт совместно с инженером по знаниям выделяет все неисправности, которые система должна различать. Затем определяется множество информативных параметров, по значениям которых можно отличить одну неисправность от другой. Для этих параметров задаются информативные значения или диапазоны значений, причем они могут быть количественными и качественными. Качественные значения нередко кодируются для удобства дальнейшей обработки. После этого составляются диагностические правила, связывающие сочетания признаков с вероятным диагнозом и его вероятностью. Если требуется учитывать изменение признаков во времени, вводятся динамические диагностические правила. На основе этих правил и набора симптомов строится механизм вывода, который последовательно задает вопросы, уточняет априорные вероятности возможных диагнозов и отбрасывает гипотезы, не подтверждаемые фактами. В результате экспертная система шаг за шагом сужает круг возможных решений и выдает наиболее вероятный диагноз."}, {"num": 28, "question": "Продукционная форма представления знаний.", "answer": "Продукционная форма представления знаний основана на использовании правил вида «если — то». Каждое такое правило связывает определенное условие с некоторым следствием и отражает фрагмент знания о предметной области. Продукции особенно удобны для описания эвристических знаний экспертов и широко применяются в экспертных системах. Структура продукции обычно включает имя правила, область применимости, условие применимости ядра, само ядро правила и постусловие. Ядро выражается в форме: если А, то В. Это означает, что при выполнении определенных условий система может сделать конкретный вывод, добавить новый факт в рабочую память или инициировать действие. Сила продукционной модели состоит в ее простоте, естественности и близости к форме человеческих рассуждений. Она хорошо подходит для построения механизмов логического вывода, так как позволяет последовательно активировать правила по мере поступления фактов. Недостатком является то, что при большом числе правил система может стать трудноуправляемой без специальных средств упорядочивания и метаправил."}, {"num": 33, "question": "Прямой метод логического дедуктивного вывода.", "answer": "Прямой метод логического дедуктивного вывода основан на движении рассуждения от известных фактов к новым заключениям. Вначале в рабочей памяти уже имеются некоторые исходные факты, после чего система последовательно ищет правила, условия которых выполняются на основе этих фактов. Когда правило срабатывает, его заключение добавляется в базу данных как новый факт, и дальше оно само может участвовать в запуске других правил. Такой процесс продолжается до получения нужного результата или до тех пор, пока новых срабатываний больше не возникает. Прямой вывод удобен в тех случаях, когда факты поступают независимо от конкретной цели и появляются во времени, а также когда необходимо заранее сформировать вторичные признаки на основе первичных. Иначе говоря, здесь не цель управляет поиском, а имеющиеся факты управляют ходом рассуждения."}, {"num": 25, "question": "Псевдофизические модели представления знаний.", "answer": "Псевдофизические модели представления знаний применяются для описания объектов и процессов, характеристики которых невозможно задать абсолютно точно, но можно выразить через приближенные, размытые или интервальные оценки. Их задача состоит в том, чтобы приблизить формальное описание к реальным условиям, где многие свойства проявляются не в виде четких границ, а в виде постепенных переходов. К числу таких моделей относится модель нечетких множеств. В ней элемент может принадлежать множеству не полностью, а с некоторой степенью принадлежности от нуля до единицы. Это особенно важно при описании понятий типа «молодой», «пожилой», «высокая температура», «малый риск», где невозможно провести абсолютно точную границу между состояниями. Вместо жесткого деления вводится функция принадлежности, отражающая, насколько выражено то или иное свойство. Значение псевдофизических моделей заключается в том, что они позволяют учитывать неопределенность и неточность, характерные для реальных данных и экспертных оценок. Благодаря этому интеллектуальная система может работать в условиях неполной формализации предметной области и более гибко интерпретировать информацию. Модель нечетких множеств"}, {"num": 47, "question": "Рекуррентные ИНС. LSTM модель.", "answer": "Рекуррентные искусственные нейронные сети отличаются от сетей прямого распространения тем, что в них имеются обратные связи. За счет этого сеть может учитывать предыдущее состояние и обрабатывать не только отдельные независимые сигналы, но и последовательности данных. Именно поэтому рекуррентные сети используются там, где важен порядок элементов: в речи, тексте, временных рядах, управлении и прогнозировании. Идея рекуррентной сети состоит в том, что текущее состояние формируется не только на основе нового входа, но и с учетом накопленной внутренней информации. Иначе говоря, сеть обладает памятью. Это позволяет ей распознавать грамматически правильные предложения, выявлять зависимости между словами, учитывать контекст и работать с динамическими процессами. LSTM-модель является современной разновидностью рекуррентной сети, созданной для более надежного хранения информации на длинных промежутках времени. В LSTM используются специальные ячейки памяти и управляющие механизмы, которые решают, что нужно запомнить, что забыть и какую часть внутреннего состояния передать дальше. Благодаря этому LSTM лучше обычных рекуррентных сетей справляется с длинными последовательностями и широко применяется при обработке естественного языка, машинном переводе, распознавании речи и анализе временных рядов."}, {"num": 1, "question": "Роль интеллектуальных информационных систем в современном мире.", "answer": "Интеллектуальные информационные системы играют важную роль в современном мире, поскольку они стали закономерным этапом развития обычных информационных систем. Их значение состоит в том, что они автоматизируют не только сбор, хранение и подготовку информации, но и сам процесс выработки вариантов решений на основе имеющихся данных. Благодаря этому ИИС применяются в управлении предприятиями, экономике, медицине, бизнесе и других сферах, где необходимо быстро обрабатывать большие объемы информации и выбирать наиболее обоснованные решения. В современном обществе такие системы повышают качество управления, сокращают время анализа ситуации, уменьшают влияние человеческих ошибок и позволяют работать со сложными, слабоформализуемыми задачами. ИИС способны диагностировать состояние объекта, поддерживать антикризисное управление, помогать при выборе стратегии развития и инвестиционных решений. Поэтому их роль заключается не просто в автоматизации рутинных операций, а в интеллектуальной поддержке человека при решении сложных профессиональных задач."}, {"num": 26, "question": "Сетевая модель представления знаний.", "answer": "Сетевая модель представления знаний основана на изображении знаний в виде графа, состоящего из узлов и связей между ними. Узлы представляют объекты, понятия, события, свойства или классы, а связи выражают отношения между ними. Такая форма позволяет наглядно представить структуру предметной области и выявить взаимосвязи между ее элементами. В семантической сети могут использоваться различные типы отношений: «класс — подкласс», «часть — целое», «объект — свойство», «объект — функция», причинно-следственные и другие. Например, можно показать, что студент и преподаватель являются разновидностями человека, а билет и оценка входят в структуру экзамена. Благодаря этому знания организуются не в виде изолированных фактов, а как взаимосвязанная система. Преимуществом сетевой модели является наглядность, удобство структурирования и возможность эффективного поиска связанных понятий. Она хорошо подходит для представления иерархий, ассоциаций и семантических зависимостей. Ограничением может быть то, что при сложных предметных областях сеть становится громоздкой, и для ее обработки требуются специальные механизмы интерпретации и вывода. Сетевая модель представления знаний"}, {"num": 21, "question": "Ситуационный анализ проблем на базе SWOT-анализа.", "answer": "Ситуационный анализ проблем на базе SWOT-анализа применяется для выявления и систематизации факторов, определяющих текущее состояние и перспективы развития объекта. Он используется после PEST-анализа, когда уже выделены основные политические, экономические, социальные и технологические факторы внешней среды. SWOT-анализ позволяет перевести эти факторы в более прикладную форму и определить, какие из них являются для объекта внутренними преимуществами, какие — внутренними недостатками, какие создают внешние возможности, а какие представляют угрозы. Сущность SWOT-анализа состоит в рассмотрении объекта одновременно с двух позиций: через его внутреннее состояние и через воздействие внешней среды. К сильным сторонам относятся такие характеристики объекта, которые повышают его устойчивость, конкурентоспособность и способность к развитию. Слабые стороны отражают внутренние ограничения, дефициты ресурсов, недостатки организации или управления. Возможности выражают благоприятные внешние обстоятельства, которые объект может использовать в своих интересах. Угрозы, напротив, представляют собой внешние воздействия, способные затруднить развитие объекта или привести к кризисным явлениям. В результате SWOT-анализа формируется проблемное поле исследуемого объекта. Оно показывает, какие противоречия и риски требуют первоочередного внимания, какие ресурсы можно использовать для роста и какие стратегии следует выбирать. Таким образом, SWOT-анализ служит не просто средством описания ситуации, а инструментом перехода от анализа к разработке стратегии развития и управления объектом."}, {"num": 39, "question": "Структуры данных на языке Prolog.", "answer": "Структуры данных в языке Prolog основаны на понятии терма. Простейшими структурами являются атомы, числа и переменные. Более сложные данные представляются составными термами, которые состоят из имени функции и набора аргументов. Именно так в Prolog описываются объекты предметной области, события и отношения между ними. Особое место занимают списки — наиболее распространенная структура данных в Prolog. Список используется для хранения упорядоченных наборов элементов и может быть пустым или состоять из головы и хвоста. Благодаря такой записи удобно организуются рекурсивная обработка данных, перебор элементов, разбиение списка и построение новых последовательностей. В целом структуры данных Prolog ориентированы не на машинное хранение как таковое, а на логическое описание объектов и удобство вывода по правилам."}, {"num": 6, "question": "Формулировка концепции создания искусственного интеллекта.", "answer": "Концепция создания искусственного интеллекта состоит в том, чтобы автоматизировать не отдельные вычислительные операции, а функции познания, анализа, обучения и выработки решений, которые в естественном виде выполняет человек. Для этого необходимо выделить основные когнитивные операции, определить их место в общем процессе познания и построить такую модель, которая могла бы быть формализована и реализована техническими средствами. Когнитивная концепция, лежащая в основе создания систем искусственного интеллекта, должна удовлетворять нескольким требованиям. Во-первых, она должна быть адекватной, то есть точно отражать реальные процессы познания, включая уточнение смысла понятий и включение новых знаний. Во-вторых, она должна иметь высокую степень детализации и структурированности, чтобы сложные интеллектуальные действия можно было разложить на более простые операции. В-третьих, она должна допускать математическое описание, формализацию и автоматизацию. Следовательно, создание искусственного интеллекта понимается как построение формальной и технически реализуемой модели интеллектуальной деятельности человека."}, {"num": 27, "question": "Фреймовая модель представления знаний.", "answer": "Фреймовая модель представления знаний рассматривает знания как совокупность структурированных описаний типовых объектов, ситуаций или действий. Такое описание называется фреймом. Фрейм состоит из слотов, то есть отдельных позиций, в которых фиксируются значения существенных характеристик объекта или ситуации. Каждый фрейм описывает некоторый стереотипный фрагмент опыта. Например, фрейм «Взятие» может включать такие слоты, как субъект, объект, место, время и условие. В общем виде это шаблон ситуации, а в конкретном случае слоты заполняются определенными значениями, например: субъект — робот, объект — деталь, место — приемный бункер, условие — в бункере есть деталь, а у робота ее нет. Главное достоинство фреймовой модели заключается в том, что она позволяет удобно представлять типовые ситуации и использовать значения по умолчанию, наследование и структурированное описание объектов. Эта модель особенно эффективна там, где знания имеют ярко выраженный контекстный и ситуационный характер."}, {"num": 31, "question": "Функционирование баз знаний ЭС.", "answer": "База знаний экспертной системы функционирует как совокупность правил и фактов, используемых для получения новых знаний и решения задачи. В продукционных системах правила обычно записываются в форме «если — то». Например, если образование высшее, возраст молодой и коммуникабельность высокая, то шансы найти работу высокие с определенным коэффициентом достоверности. Когда правило срабатывает, в рабочую память добавляется новый факт. Факты в базе данных продукционной системы могут храниться в форме пары или четверки, например: объект, значение, коэффициент достоверности; либо объект, атрибут, значение, коэффициент достоверности. Это позволяет системе учитывать не только само знание, но и степень уверенности в нем. Кроме обычных правил, в базе знаний могут использоваться метаправила. Они не описывают предметную область напрямую, а управляют самим процессом вывода, например изменяют приоритеты правил в зависимости от ситуации. Благодаря этому можно организовать более гибкое и целенаправленное рассуждение. При интерпретации правила система проверяет, имеются ли нужные факты в рабочей памяти. Если нужного факта нет, она обращается к внешнему источнику данных — пользователю, базе данных или другому модулю. Далее запускается механизм логического вывода. Он может быть обратным, когда движение идет от цели к необходимым фактам, или прямым, когда исходные факты сами активируют подходящие правила. Таким образом, функционирование базы знаний связано не только с хранением правил, но и с их последовательным применением в процессе рассуждения."}, {"num": 29, "question": "Экспертные системы. Классификация.", "answer": "Экспертная система — это программа, использующая знания специалистов в некоторой узкоспециализированной предметной области и способная в пределах этой области принимать решения на уровне эксперта. Классификация экспертных систем проводится по нескольким основаниям. По назначению выделяют экспертные системы общего назначения и специализированные. Специализированные системы могут быть проблемно-ориентированными, то есть предназначенными для диагностики, проектирования, прогнозирования, и предметно-ориентированными, создаваемыми для конкретной сферы, например для контроля ситуации на сложных технических объектах. По степени зависимости от внешней среды различают статические и динамические экспертные системы. Статические системы работают с относительно неизменной информацией, а динамические учитывают изменение внешней среды и решают задачи в реальном времени. По типу использования бывают изолированные экспертные системы, системы на входе или выходе других программ и гибридные системы, интегрированные с базами данных и иными приложениями. По сложности решаемых задач выделяют простые, средние и сложные экспертные системы. По стадии создания различают исследовательский, демонстрационный, промышленный и коммерческий образцы. Такая классификация показывает, что экспертные системы могут существенно различаться по своему назначению, масштабу, условиям функционирования и степени готовности."}, {"num": 30, "question": "Экспертные системы. Составные части. Функционирование.", "answer": "Экспертная система включает несколько основных составных частей, совместная работа которых обеспечивает получение решения. Центральным компонентом является база знаний, в которой хранятся знания эксперта о предметной области. Эти знания отделены от данных, что является одним из важнейших свойств экспертной системы. Машина логического вывода представляет собой механизм рассуждений, который оперирует знаниями и данными и получает новые факты или выводы. Для этого используются различные разновидности дедуктивного логического вывода либо поиск решения в сети фреймов или семантической сети. Подсистема общения предназначена для диалога с пользователем. Через нее система получает исходные факты, задает уточняющие вопросы и выдает результат. Подсистема объяснений нужна для того, чтобы пользователь мог понять, каким образом было получено решение и почему система пришла именно к такому выводу. Без такой подсистемы доверие к системе резко снижается. Подсистема приобретения знаний обеспечивает пополнение и корректировку базы знаний. В простейшем варианте это редактор знаний, а в более сложных системах — средства извлечения знаний из баз данных, текстов и других источников. Функционирование экспертной системы строится как взаимодействие базы знаний, рабочей памяти, механизма вывода и пользователя. Система получает факты, сопоставляет их с правилами, делает выводы, при необходимости запрашивает дополнительную информацию и выдает решение с объяснением. Составные части экспертной системы и порядок ее функционирования"}, {"num": 22, "question": "Этапы когнитивной технологии.", "answer": "Когнитивная технология представляет собой последовательность этапов, направленных на исследование ситуации, построение ее модели, анализ вариантов развития и выработку стратегии управления. Она ориентирована на получение структурированных знаний о проблемной области и на использование этих знаний для прогнозирования и принятия решений. Первый этап — когнитивная, или познавательно-целевая, структуризация знаний об исследуемом объекте и его внешней среде. На этом этапе выделяются базисные факторы, сильные и слабые стороны объекта, возможности и угрозы, а также строится проблемное поле. Второй этап — построение когнитивной модели развития объекта. Здесь знания, полученные на предыдущем этапе, формализуются: выделяются факторы, устанавливаются связи между ними и строится ориентированный граф или матрица взаимосвязей. Третий этап — сценарное исследование тенденций развития ситуации. Для этого задаются различные сценарии, моделируется их влияние на объект и выявляются возможные траектории его развития. Четвертый этап — разработка стратегий управления ситуацией вокруг объекта. На этом этапе определяется цель управления, решается обратная задача и отбираются стратегии с учетом возможности достижения цели и рисков. Пятый этап — поиск и обоснование стратегий достижения цели в стабильных или изменяющихся ситуациях. Здесь сравниваются варианты действий по близости к цели, затратам, последстви
