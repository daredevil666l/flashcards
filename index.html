ям и степени риска. Шестой этап — разработка программы реализации стратегии на основе динамического имитационного моделирования. Итогом становится программа действий, включающая распределение ресурсов, координацию и контроль исполнения. Технология когнитивного анализа и моделирования"}, {"num": 34, "question": "Этапы проектирования ЭС.", "answer": "Проектирование экспертной системы включает шесть основных этапов: идентификацию, концептуализацию, формализацию, выполнение, тестирование и опытную эксплуатацию. На этапе идентификации составляется неформальное описание задачи: определяются ее характеристики, подзадачи, ключевые понятия, входные и выходные данные, предполагаемый вид решения и круг знаний, которые потребуются системе. На этапе концептуализации создается модель предметной области, выделяются основные объекты, отношения между ними, типы данных, стратегии решения, ограничения и знания, необходимые для обоснования выводов. Этап формализации связан с выбором способа представления знаний и построением формальной модели будущей системы. На этапе выполнения осуществляется программная реализация: создается база знаний, механизм вывода, интерфейс и другие компоненты. Далее проводится тестирование, в ходе которого проверяется корректность работы системы и качество решений на контрольных примерах. Завершается процесс опытной эксплуатацией, когда система применяется в реальных условиях, а выявленные недостатки уточняются и устраняются."}];
    const STORAGE_KEY = "iis-flashcards-gh-pages-v1";

    const state = {
      search: "",
      onlyDifficult: false,
      onlyUnread: false,
      showAnswer: false,
      read: {},
      difficult: {},
      currentId: QUESTIONS[0]?.num ?? null,
    };

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        Object.assign(state, saved);
      } catch (e) {}
    }

    function saveState() {
      const payload = {
        read: state.read,
        difficult: state.difficult,
        currentId: state.currentId,
        onlyDifficult: state.onlyDifficult,
        onlyUnread: state.onlyUnread,
        search: state.search
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }

    function filteredQuestions() {
      return QUESTIONS.filter(q => {
        const text = `${q.num} ${q.question} ${q.answer}`.toLowerCase();
        if (state.search && !text.includes(state.search.toLowerCase())) return false;
        if (state.onlyDifficult && !state.difficult[q.num]) return false;
        if (state.onlyUnread && state.read[q.num]) return false;
        return true;
      });
    }

    function currentQuestion() {
      const list = filteredQuestions();
      return list.find(q => q.num === state.currentId) || list[0] || QUESTIONS[0];
    }

    function markFilteredRead() {
      filteredQuestions().forEach(q => state.read[q.num] = true);
      saveState();
      render();
    }

    function resetMarks() {
      if (!confirm("Сбросить отметки «прочитано» и «сложный»?")) return;
      state.read = {};
      state.difficult = {};
      saveState();
      render();
    }

    function toggleRead(num) {
      state.read[num] = !state.read[num];
      saveState();
      render();
    }

    function toggleDifficult(num) {
      state.difficult[num] = !state.difficult[num];
      saveState();
      render();
    }

    function goNext() {
      const list = filteredQuestions();
      if (!list.length) return;
      const i = list.findIndex(q => q.num === state.currentId);
      state.currentId = list[(i + 1) % list.length].num;
      state.showAnswer = false;
      saveState();
      render();
    }

    function goPrev() {
      const list = filteredQuestions();
      if (!list.length) return;
      const i = list.findIndex(q => q.num === state.currentId);
      state.currentId = list[(i - 1 + list.length) % list.length].num;
      state.showAnswer = false;
      saveState();
      render();
    }

    function goRandom() {
      const list = filteredQuestions();
      if (!list.length) return;
      const q = list[Math.floor(Math.random() * list.length)];
      state.currentId = q.num;
      state.showAnswer = false;
      saveState();
      render();
    }

    function renderList() {
      const listEl = document.getElementById("questionList");
      const list = filteredQuestions();
      const cur = currentQuestion();

      listEl.innerHTML = "";
      if (!list.length) {
        listEl.innerHTML = '<div class="q-item">Ничего не найдено.</div>';
        return;
      }

      list.forEach(q => {
        const btn = document.createElement("button");
        btn.className = "q-item" + (cur && q.num === cur.num ? " active" : "");
        btn.innerHTML = `
          <div class="q-top">
            <span>Вопрос ${q.num}</span>
            <span>${state.difficult[q.num] ? "★" : ""} ${state.read[q.num] ? "✓" : "○"}</span>
          </div>
          <div class="q-title">${escapeHtml(q.question)}</div>
        `;
        btn.onclick = () => {
          state.currentId = q.num;
          state.showAnswer = false;
          saveState();
          render();
        };
        listEl.appendChild(btn);
      });
    }

    function escapeHtml(s) {
      return s
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function renderCard() {
      const q = currentQuestion();
      if (!q) return;

      const content = document.getElementById("cardContent");
      content.className = state.showAnswer ? "answer-face" : "question-face";
      content.textContent = state.showAnswer ? q.answer : q.question;

      document.getElementById("cardLabel").textContent = `Вопрос ${q.num}`;
      document.getElementById("readIcon").textContent = state.read[q.num] ? "✓" : "○";
      document.getElementById("diffIcon").textContent = state.difficult[q.num] ? "★" : "☆";
      document.getElementById("readToggle").classList.toggle("active", !!state.read[q.num]);
      document.getElementById("diffToggle").classList.toggle("active", !!state.difficult[q.num]);

      const pills = document.getElementById("cardPills");
      pills.innerHTML = "";
      if (state.read[q.num]) {
        const p = document.createElement("span");
        p.className = "badge pill-read";
        p.textContent = "Прочитано";
        pills.appendChild(p);
      }
      if (state.difficult[q.num]) {
        const p = document.createElement("span");
        p.className = "badge pill-diff";
        p.textContent = "Сложный";
        pills.appendChild(p);
      }
    }

    function renderStats() {
      document.getElementById("statTotal").textContent = QUESTIONS.length;
      document.getElementById("statRead").textContent = QUESTIONS.filter(q => state.read[q.num]).length;
      document.getElementById("statDiff").textContent = QUESTIONS.filter(q => state.difficult[q.num]).length;

      const list = filteredQuestions();
      const cur = currentQuestion();
      const index = Math.max(0, list.findIndex(q => q.num === (cur && cur.num)));
      document.getElementById("filteredBadge").textContent = `${list.length} в списке`;
      document.getElementById("positionBadge").textContent = `${Math.min(index + 1, Math.max(list.length, 1))} / ${Math.max(list.length, 1)}`;
    }

    function renderNumGrid() {
      const grid = document.getElementById("numGrid");
      const cur = currentQuestion();
      grid.innerHTML = "";
      QUESTIONS.forEach(q => {
        const b = document.createElement("button");
        b.className = "num-btn" + (cur && cur.num === q.num ? " active" : "");
        b.textContent = q.num;
        b.onclick = () => {
          state.currentId = q.num;
          state.showAnswer = false;
          saveState();
          render();
        };
        grid.appendChild(b);
      });
    }

    function render() {
      const cur = currentQuestion();
      if (cur && cur.num !== state.currentId) {
        state.currentId = cur.num;
        saveState();
      }
      renderList();
      renderCard();
      renderStats();
      renderNumGrid();
    }

    document.getElementById("search").addEventListener("input", (e) => {
      state.search = e.target.value;
      saveState();
      render();
    });
    document.getElementById("onlyDifficult").addEventListener("change", (e) => {
      state.onlyDifficult = e.target.checked;
      saveState();
      render();
    });
    document.getElementById("onlyUnread").addEventListener("change", (e) => {
      state.onlyUnread = e.target.checked;
      saveState();
      render();
    });
    document.getElementById("markFilteredRead").addEventListener("click", markFilteredRead);
    document.getElementById("resetMarks").addEventListener("click", resetMarks);
    document.getElementById("prevBtn").addEventListener("click", goPrev);
    document.getElementById("nextBtn").addEventListener("click", goNext);
    document.getElementById("randomBtn").addEventListener("click", goRandom);
    document.getElementById("flipBtn").addEventListener("click", () => {
      state.showAnswer = !state.showAnswer;
      renderCard();
    });
    document.getElementById("readToggle").addEventListener("click", () => toggleRead(currentQuestion().num));
    document.getElementById("diffToggle").addEventListener("click", () => toggleDifficult(currentQuestion().num));

    loadState();
    document.getElementById("search").value = state.search || "";
    document.getElementById("onlyDifficult").checked = !!state.onlyDifficult;
    document.getElementById("onlyUnread").checked = !!state.onlyUnread;
    render();
  </script>
</body>
</html>
